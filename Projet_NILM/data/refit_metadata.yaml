# refit_metadata.yaml
# --------------------
# Appliance-column mappings for every REFIT house and canonical alias table.
#
# Source: REFIT dataset documentation —
#   https://pureportal.strath.ac.uk/en/datasets/refit-electrical-load-measurements-cleaned
#
# Structure
# ---------
# house_appliances:
#   <house_number>:           # integer key (1-21, no 14)
#     - <Appliance1 label>    # index 0 → Appliance1 column
#     - <Appliance2 label>
#     ...                     # index 8 → Appliance9 column
#
# appliance_aliases:
#   <canonical_name>:         # used throughout the pipeline (e.g. "kettle")
#     - <label variant 1>     # lower-case strings matched against house labels
#     - <label variant 2>

